<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>时尚的尽头是一件永不过时的单品</title>

<style>
* {
  box-sizing: border-box;
  scroll-behavior: smooth;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont;
  background: linear-gradient(to bottom, #fff8fa, #fff2f5);
}

/* 顶部导航栏 */
.navbar {
  position: sticky;
  top: 0;
  backdrop-filter: blur(14px);
  background: rgba(255, 246, 248, 0.8);
  border-bottom: 1px solid rgba(220,180,190,0.3);
  z-index: 1000;
}

.nav-inner {
  display: flex;
  justify-content: center;
  gap: 12px;
  padding: 12px;
}

.nav-inner a {
  text-decoration: none;
  color: #8f6270;
  font-size: 14px;
  padding: 6px 12px;
  border-radius: 20px;
}

.nav-inner a:hover {
  background: rgba(230,150,170,0.2);
}

/* 大标题 */
.hero {
  text-align: center;
  padding: 80px 20px 40px;
}

.hero h1 {
  font-size: 32px;
  font-weight: 600;
}

/* 主体 */
.container {
  max-width: 1000px;
  margin: auto;
  padding: 20px;
}

/* 一级分类 */
.season {
  margin-top: 50px;
}

.season-title {
  text-align: center;
  font-size: 26px;
  margin-bottom: 20px;
}

/* 二级分类 */
.subsection {
  margin-top: 30px;
}

.subsection-title {
  text-align: center;
  font-size: 18px;
  color: #b07a89;
  margin-bottom: 15px;
}

/* 卡片框架（占位用） */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.card {
  height: 200px;
  border-radius: 20px;
  background: rgba(255,255,255,0.6);
  border: 1px dashed rgba(200,150,165,0.4);
}

/* 手机适配 */
@media (max-width: 700px) {
  .grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>
