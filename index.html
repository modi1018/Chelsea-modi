<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>时尚的尽头是一件永不过时的单品</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont;
  background: #fff7f9;
  color: #333;
}

h1 {
  text-align: center;
  margin: 60px 20px 40px;
  font-weight: 400;
  letter-spacing: 2px;
  font-size: 20px;
  color: #c2185b;
}

.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 30px;
  padding: 40px;
  max-width: 1000px;
  margin: auto;
}

.card {
  background: white;
  border-radius: 18px;
  overflow: hidden;
  box-shadow: 0 10px 25px rgba(0,0,0,0.05);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

img {
  width: 100%;
  display: block;
}

.content {
  padding: 15px;
}

button {
  background: #f06292;
  border: none;
  padding: 8px 14px;
  border-radius: 20px;
  color: white;
  font-size: 12px;
  cursor: pointer;
}

button:hover {
  background: #ec407a;
}

.text {
  margin-top: 10px;
  display: none;
  font-size: 13px;
  color: #666;
}
</style>
</head>

<body>

<h1>时尚的尽头是一件永不过时的单品</h1>

<div class="gallery">

  <div class="card">
    <img src="IMG_4091.jpeg">
    <div class="content">
      <button onclick="toggle('t1')">view</button>
      <div id="t1" class="text">。）</div>
    </div>
  </div>

  <div class="card">
    <img src="IMG_4089.jpeg">
    <div class="content">
      <button onclick="toggle('t2')">view</button>
      <div id="t2" class="text">。</div>
    </div>
  </div>

  <div class="card">
    <img src="IMG_3688.jpeg">
    <div class="content">
      <button onclick="toggle('t3')">view</button>
      <div id="t3" class="text">。</div>
    </div>
  </div>

  <div class="card">
    <img src="FullSizeRender.jpeg">
    <div class="content">
      <button onclick="toggle('t4')">view</button>
      <div id="t4" class="text">。</div>
    </div>
  </div>

</div>

<script>
function toggle(id) {
  let el = document.getElementById(id);
  el.style.display = el.style.display === "block" ? "none" : "block";
}
</script>

</body>
</html>
